name: Build Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

env:
  SOLUTION_FILE: BorderlessGaming.sln
  BUILD_CONFIGURATION: Release
  BUILD_PLATFORM: Any CPU

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Restore legacy NuGet packages
        run: nuget restore $env:SOLUTION_FILE

      - name: Restore PackageReference dependencies
        run: msbuild $env:SOLUTION_FILE /t:Restore /p:Configuration="$env:BUILD_CONFIGURATION" /p:Platform="$env:BUILD_PLATFORM"

      - name: Build solution
        run: msbuild $env:SOLUTION_FILE /m /p:Configuration="$env:BUILD_CONFIGURATION" /p:Platform="$env:BUILD_PLATFORM" /p:RunPostBuildEvent=Never /p:PostBuildEvent=

      - name: Stage portable package
        shell: pwsh
        run: |
          $artifactRoot = Join-Path $env:RUNNER_TEMP "borderless-gaming-windows"
          if (Test-Path $artifactRoot) {
            Remove-Item -LiteralPath $artifactRoot -Recurse -Force
          }

          New-Item -ItemType Directory -Path $artifactRoot | Out-Null
          Copy-Item -Path "BorderlessGaming\bin\Release\*" -Destination $artifactRoot -Recurse -Force
          Copy-Item -LiteralPath "Languages\Languages.zip" -Destination (Join-Path $artifactRoot "Languages.zip") -Force
          Copy-Item -LiteralPath "LICENSE" -Destination (Join-Path $artifactRoot "LICENSE.txt") -Force
          Copy-Item -LiteralPath "README.md" -Destination (Join-Path $artifactRoot "README.md") -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: borderless-gaming-windows
          path: ${{ runner.temp }}\borderless-gaming-windows
          if-no-files-found: error
